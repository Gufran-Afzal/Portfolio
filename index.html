<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Ghufran Afzal</title>
	<link rel="stylesheet" href="css/styles.css">
	<link rel="icon" href="images/icons/shopify-icon.svg" type="image/svg+xml">
</head>
<body>
	<section class="contact-section">
		<div class="container">
			<div class="contact-wrapper">
				<header class="contact-header">
					<h2>Contact Us</h2>
					<span class="underline"></span>
					<p>Got a project? Let’s talk</p>
				</header>
				<div class="contact-section_grid">
					<div class="contact-section_col contact-info">
						<p class="contact-info_title">CONTACT INFO</p>
						<h3 class="contact-info_heading">Get in touch</h3>
						<div class="contact-info_email">
							<div class="contact-info_email-icon">
								<img src="images/icons/chat.png" alt="chat-icon">
							</div>
							<div class="contact-info_email-text">
								<p>Talk to us:</p>
								<a href="mailto:gufranafzal54@gmail.com">gufranafzal5@gmail.com</a>
							</div>
						</div>
						<div class="contact-info_phone">
							<div class="contact-info_phone-icon">
								<img src="images/icons/phone.png" alt="phone-icon">
							</div>
							<div class="contact-info_phone-text">
								<p>Call us:</p>
								<a>+92 327 0160677</a>
							</div>
						</div>
						<div class="contact-info_location">
							<div class="contact-info_location-icon">
								<img src="images/icons/location.png" alt="location-icon">
							</div>
							<div class="contact-info_location-text">
								<p>Address</p>
								<a>Roshan Street, Gunj Baksh Road, Ichra, Lahore</a>
							</div>
						</div>
					</div>
					<div class="contact-section_col contact-form">
					</div>
				</div>
			</div>
		</div>
	</section>
</body>
</html>
